<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | DoubleU</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ffff; /* Cyan */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-transform: uppercase;
            overflow: hidden;
        }

        .glitch {
            font-size: 10rem;
            font-weight: 900;
            position: relative;
            text-shadow: 0.05em 0 0 #ff4500, -0.025em -0.05em 0 #00ffff;
            animation: glitch 1s infinite;
        }

        h2 { color: #ff4500; /* Neon Orange */ letter-spacing: 5px; }

        .btn {
            margin-top: 30px;
            padding: 10px 20px;
            border: 1px solid #ff4500;
            color: #ff4500;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn:hover { background: #ff4500; color: #000; box-shadow: 0 0 15px #ff4500; }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>
    <div class="glitch">404</div>
    <h2>Signal Lost</h2>
    <p>The doubleU frequency is out of range.</p>
    <a href="https://doubleuofficial.online" class="btn">Return to Base</a>
</body>
</html>
